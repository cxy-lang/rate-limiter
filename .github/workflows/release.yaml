# Create a release when a release tag is created
on:
  push:
    tags:
      - "v*.*.*" # Push events to matching v*, i.e. v1.0, v20.15.10

name: Create Release

jobs:
  integration:
    runs-on: ubuntu-latest
    container: suilteam/cxy:latest-ubuntu
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build
        run: cxy package run integration

  release:
    needs: [integration]
    runs-on: ubuntu-latest
    container: suilteam/cxy:latest-ubuntu
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
